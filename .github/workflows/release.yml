name: Build Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pack release archive
        run: |
          mkdir -p /tmp/reality-site
          cp -r site/ install.sh modules/ /tmp/reality-site/
          cd /tmp
          tar czf reality-site.tar.gz reality-site/

      - name: Generate tag
        id: tag
        run: |
          TAG="v$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            Reality SNI 伪装站点部署包

            一键部署命令（独立模式）：
            ```bash
            bash <(curl -sL https://github.com/${{ github.repository }}/releases/latest/download/install.sh) \
              -d 你的域名 -e 你的邮箱 -m standalone
            ```

            与 sing-box 共存模式：
            ```bash
            bash <(curl -sL https://github.com/${{ github.repository }}/releases/latest/download/install.sh) \
              -d 你的域名 -e 你的邮箱 -m with-singbox
            ```
          files: |
            /tmp/reality-site.tar.gz
            install.sh
            modules/core.sh
            modules/site.sh
            modules/security.sh
