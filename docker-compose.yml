version: '3.8'

services:
  caddy:
    image: caddy:alpine
    container_name: my-site
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./index.html:/usr/share/caddy/index.html:ro
      - caddy_data:/data
    restart: unless-stopped

volumes:
  caddy_data:
